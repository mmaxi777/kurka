<script src="game.js"></script>

<script>
(function(){
    const devices = [
        {label: '1366×768', w: 1366},
        {label: '1440×900', w: 1440},
        {label: '1920×1080', w: 1920},
        {label: 'Reset', w: 0}
    ];

    const container = document.getElementById('game-container');
    if (!container) return;

    const panel = document.createElement('div');
    panel.className = 'dev-panel';

    let original = {
        width: container.style.width || '',
        transform: container.style.transform || '',
        transformOrigin: container.style.transformOrigin || '',
        marginLeft: container.style.marginLeft || ''
    };

    const overlay = document.createElement('div');
    overlay.className = 'dev-overlay-label';
    document.body.appendChild(overlay);

    function applyDevice(w){
        if (!w) {
            container.style.width = original.width;
            container.style.transform = original.transform;
            container.style.transformOrigin = original.transformOrigin;
            container.style.marginLeft = original.marginLeft;
            overlay.style.display = 'none';
            document.querySelectorAll('.dev-panel .dev-btn').forEach(b=>b.classList.remove('active'));
            return;
        }

        const vpW = window.innerWidth;
        let scale = vpW / w;
        scale = Math.max(0.4, Math.min(scale, 2));

        container.style.width = w + 'px';
        container.style.transformOrigin = 'top left';
        container.style.transform = 'scale(' + scale + ')';
        container.style.marginLeft = 'auto';
        overlay.textContent = 'Simulated: ' + w + 'px — scale: ' + scale.toFixed(2);
        overlay.style.display = 'block';
    }

    devices.forEach(dev => {
        const btn = document.createElement('button');
        btn.className = 'dev-btn';
        btn.textContent = dev.label;
        btn.addEventListener('click', ()=>{
            document.querySelectorAll('.dev-panel .dev-btn').forEach(b=>b.classList.remove('active'));
            if (dev.w === 0) {
                applyDevice(0);
            } else {
                btn.classList.add('active');
                applyDevice(dev.w);
            }
        });
        panel.appendChild(btn);
    });

    document.body.appendChild(panel);
    window.addEventListener('keydown', function(e){
        if (e.key === 'Escape') applyDevice(0);
    });
})();
</script>
